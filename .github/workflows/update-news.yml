name: Comprehensive Data Update

on:
  schedule:
    - cron: '0 */6 * * *'  # Каждые 6 часов для большей актуальности
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      # ИСПРАВЛЕНО: Очистка + свежая установка
      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
      
      # Шаг 1: Сбор данных из всех источников
      - name: Collect data from all sources
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          echo "=== НАЧАЛО СБОРА ДАННЫХ ==="
          node news-api.js
          echo "=== СБОР ЗАВЕРШЁН ==="
      
      # Шаг 2: Архивация
      - name: Archive events
        run: |
          echo "=== АРХИВАЦИЯ ==="
          node archive-events.js
      
      # Шаг 3: Проверка результата
      - name: Verify files
        run: |
          echo "=== ПРОВЕРКА ФАЙЛОВ ==="
          ls -lh data/
          echo ""
          echo "events.json (первые 5 событий):"
          cat data/events.json | jq '.events[:5]' || cat data/events.json | head -100
          echo ""
          echo "events-archive.json (метаданные):"
          cat data/events-archive.json | jq '.metadata' || cat data/events-archive.json | head -50
      
      # Шаг 4: Коммит изменений
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Auto-update: $(date +'%Y-%m-%d %H:%M') | Events: $(jq '.events | length' data/events.json) | Archive: $(jq '.metadata.totalEvents' data/events-archive.json)"
          file_pattern: 'data/*.json'
      
      # Шаг 5: Пересборка GitHub Pages
      - name: Trigger Pages rebuild
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.requestPagesBuild({
              owner: context.repo.owner,
              repo: context.repo.repo
            })
        continue-on-error: true
      
      # Шаг 6: Summary
      - name: Create summary
        run: |
          echo "## 📊 Результат обновления" >> $GITHUB_STEP_SUMMARY
          echo "- Время: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- Событий в events.json: $(jq '.events | length' data/events.json)" >> $GITHUB_STEP_SUMMARY
          echo "- В архиве: $(jq '.metadata.totalEvents' data/events-archive.json)" >> $GITHUB_STEP_SUMMARY
          echo "- Последнее обновление: $(jq -r '.metadata.lastUpdated' data/events.json)" >> $GITHUB_STEP_SUMMARY
